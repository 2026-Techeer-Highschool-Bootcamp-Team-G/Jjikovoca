# 프로덕션 — EC2. 시크릿은 SSM Parameter Store에서 환경변수 주입 (08 §7, 이미지에 설정 없음)
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/jjikeoboka?connectionTimeZone=Asia/Seoul&forceConnectionTimeZoneToSession=true&characterEncoding=UTF-8
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}

gemini:
  mock: false
  api-key: ${GEMINI_API_KEY}

logging:
  level:
    org.hibernate.SQL: warn        # prod에선 SQL 로그 off
  # TODO(07): logback JSON 인코더 + traceId(OTel MDC) 주입
