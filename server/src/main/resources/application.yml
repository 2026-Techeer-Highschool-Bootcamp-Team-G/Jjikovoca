# 공통 설정 (13 §7). 프로파일: local(compose) / prod(EC2)
spring:
  application:
    name: jjikboka-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    hibernate:
      ddl-auto: validate      # Flyway가 스키마 소유 — JPA는 검증만 (08 §6)
    open-in-view: false
    properties:
      hibernate.format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration   # V1__baseline.sql (03 ERD)

server:
  port: ${SERVER_PORT:8000}    # 기본 8000(프론트 proxy·05 §2-1 정합). SERVER_PORT env로 덮어쓰기 가능

# 관측 초기 활성 (05 §2-2, 07) — 대시보드가 첫 배포부터 그려지도록
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true          # RedisHealthIndicator 자동 포함 (13 §9-4)
  metrics:
    tags:
      application: jjikboka

# JWT 무상태 인증 (13 §5). secret은 prod에서 env(JWT_SECRET)로 주입 — 이미지에 굽지 않음(15 §7)
# HS256이라 secret은 최소 256bit(32바이트) 이상이어야 한다.
jwt:
  secret: ${JWT_SECRET:local-dev-only-secret-please-override-in-prod-0123456789}
  access-exp-ms: 1800000       # 액세스 30분
  refresh-exp-ms: 1209600000   # 리프레시 14일

# 크롭 이미지 저장소 (API-10). 기본 local(파일) — 워커가 여기 저장, /images/{file}이 여기서 서빙.
# storage=s3면 S3ImageStorageService가 뜬다(계약 불변, 토글만 전환). 자격은 env/IAM(15 §7), 이미지에 미탑재.
app:
  image:
    storage: ${APP_IMAGE_STORAGE:local}   # local | s3
    dir: ${APP_IMAGE_DIR:./data/images}
    s3:
      bucket: ${APP_IMAGE_S3_BUCKET:}
      region: ${APP_IMAGE_S3_REGION:ap-northeast-2}
  # 내보내기 (API-25·26). 저장은 로컬 파일 — 생성 파일을 여기 쓰고 /api/export/{id}/download가 서빙.
  # renderer=stub(기본)은 텍스트 .txt, chromium은 Playwright headless Chromium으로 PDF/PNG(브라우저 바이너리 필요).
  export:
    dir: ${APP_EXPORT_DIR:./data/exports}
    renderer: ${APP_EXPORT_RENDERER:stub}   # stub | chromium

# Gemini 연동 (API-6·16·41). 기본은 모의(mock=true) — 키·원가 없이 흐름이 돌아간다.
# 실 연동은 GEMINI_MOCK=false + GEMINI_API_KEY 주입 시 RealGeminiClient가 뜬다(계약 불변, 토글만 전환).
# 키는 이미지에 굽지 않고 env로만(15 §7). models는 폴백 체인 — 앞에서부터 시도하고 실패 시 다음.
gemini:
  mock: ${GEMINI_MOCK:true}
  api-key: ${GEMINI_API_KEY:}
  base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
  models:                    # 폐기 안 되는 -latest 별칭(구 gemini-2.5-flash 등은 신규 사용자 폐기 → 404)
    - gemini-flash-latest
    - gemini-flash-lite-latest
  timeout-ms: 30000

# 로그 JSON 구조화는 배포 프로파일에서 (07 규약) — traceId 주입 자리
logging:
  level:
    org.hibernate.SQL: debug   # 캐시 히트 검증(§9-4)에서 "2회차 SQL 없음" 확인용 (prod에선 off)
