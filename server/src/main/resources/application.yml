# 공통 설정 (13 §7). 프로파일: local(compose) / prod(EC2)
spring:
  application:
    name: jjikboka-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    hibernate:
      ddl-auto: validate      # Flyway가 스키마 소유 — JPA는 검증만 (08 §6)
    open-in-view: false
    properties:
      hibernate.format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration   # V1__baseline.sql (03 ERD)

server:
  port: 8080

# 관측 초기 활성 (05 §2-2, 07) — 대시보드가 첫 배포부터 그려지도록
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true          # RedisHealthIndicator 자동 포함 (13 §9-4)
  metrics:
    tags:
      application: jjikboka

# JWT 무상태 인증 (13 §5). secret은 prod에서 env(JWT_SECRET)로 주입 — 이미지에 굽지 않음(15 §7)
# HS256이라 secret은 최소 256bit(32바이트) 이상이어야 한다.
jwt:
  secret: ${JWT_SECRET:local-dev-only-secret-please-override-in-prod-0123456789}
  access-exp-ms: 1800000       # 액세스 30분
  refresh-exp-ms: 1209600000   # 리프레시 14일

# 크롭 이미지 저장소 (API-10). MVP는 로컬 파일 — 워커(Phase 2)가 여기 저장, /images/{file}이 여기서 서빙.
# prod에선 env(APP_IMAGE_DIR)로 EBS/마운트 경로 주입. S3 전환 시 이 설정을 버킷/presigned로 대체.
app:
  image:
    dir: ${APP_IMAGE_DIR:./data/images}

# 로그 JSON 구조화는 배포 프로파일에서 (07 규약) — traceId 주입 자리
logging:
  level:
    org.hibernate.SQL: debug   # 캐시 히트 검증(§9-4)에서 "2회차 SQL 없음" 확인용 (prod에선 off)
