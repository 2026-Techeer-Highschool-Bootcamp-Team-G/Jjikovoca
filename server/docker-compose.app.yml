# 로컬/단일서버 스택 (13 §8). 사용:
#   개발  → docker compose -f docker-compose.app.yml up -d mysql redis  (앱은 IDE bootRun)
#   통합  → docker compose -f docker-compose.app.yml --profile full up -d --build
services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: jjikeoboka
      MYSQL_USER: ${DB_USER:-jjik}
      MYSQL_PASSWORD: ${DB_PASSWORD:-jjik}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      TZ: UTC
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports: ["3306:3306"]
    volumes: ["mysql-data:/var/lib/mysql"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    # 캐시 전용 — 메모리 상한 + LRU 축출 (13 §9-1: 원장 아님, 날아가도 재계산 가능)
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build: .
    profiles: ["full"]
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_HOST: mysql
      DB_USER: ${DB_USER:-jjik}
      DB_PASSWORD: ${DB_PASSWORD:-jjik}
      REDIS_HOST: redis
      GEMINI_MOCK: ${GEMINI_MOCK:-true}
    ports: ["8080:8080"]

  nginx:
    image: nginx:1.27-alpine
    profiles: ["full"]
    depends_on: [server]
    ports: ["80:80"]
    volumes: ["./nginx.conf:/etc/nginx/nginx.conf:ro"]

volumes:
  mysql-data:
